<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tasks</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

:root {
  --bg:    #0C0C14;
  --bg2:   #13131F;
  --bg3:   #1A1A2A;
  --text:  #F0F0FF;
  --hint:  #5A5A7A;
  --btn:   #7C6EFF;
  --accent:#7C6EFF;
  --r:     16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  background: var(--bg); color: var(--text);
  font-family: 'Nunito', -apple-system, sans-serif;
  font-size: 15px; line-height: 1.5;
  overscroll-behavior: none; min-height: 100vh;
}
#app { display: flex; flex-direction: column; min-height: 100vh; }

/* ── Header ── */
.header {
  position: sticky; top: 0; z-index: 30;
  background: rgba(12,12,20,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 0 14px; height: 54px;
  display: flex; align-items: center; gap: 8;
}
.hdr-title { flex: 1; font-size: 17px; font-weight: 900; display: flex; align-items: center; gap: 7; overflow: hidden; }
.hdr-title .em { font-size: 20px; flex-shrink: 0; }
.hdr-title .lbl { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.hdr-btn {
  width: 36px; height: 36px; border-radius: 12px;
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0; transition: all .15s;
  background: rgba(255,255,255,0.07); color: var(--hint);
}
.hdr-btn:active { transform: scale(.9); }
.hdr-btn.primary {
  background: linear-gradient(135deg, #7C6EFF, #B06EFF);
  color: #fff; font-size: 22px; font-weight: 300;
  box-shadow: 0 0 20px rgba(124,110,255,0.4);
}

/* ── Search ── */
.search-wrap { padding: 8px 14px 4px; position: relative; }
.search-input {
  width: 100%; background: var(--bg2);
  border: 1.5px solid rgba(255,255,255,0.06);
  border-radius: 14px; padding: 10px 12px 10px 38px;
  color: var(--text); font-size: 14px; font-family: inherit; font-weight: 600;
  outline: none; transition: border-color .18s;
}
.search-input:focus { border-color: rgba(124,110,255,0.4); }
.search-icon { position: absolute; left: 26px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--hint); pointer-events: none; }

/* ── Done toggle ── */
.done-toggle {
  margin: 6px 14px; padding: 9px 14px;
  background: var(--bg2); border: 1.5px solid rgba(255,255,255,0.06);
  border-radius: 14px; color: var(--hint); font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 7;
}
.done-toggle.on { background: rgba(124,110,255,0.1); border-color: rgba(124,110,255,0.3); color: #9D91FF; }

/* ── Task list ── */
.task-list { flex: 1; padding: 6px 14px 100px; display: flex; flex-direction: column; gap: 9; }
.empty { display: flex; flex-direction: column; align-items: center; padding: 70px 0; gap: 10; }
.empty-icon { font-size: 52px; opacity: .12; }
.empty-text { font-size: 17px; font-weight: 800; color: var(--hint); }
.empty-sub  { font-size: 13px; color: var(--hint); opacity: .6; }

/* ── Task card ── */
.task-card {
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.05);
  border-left: 3px solid var(--cc);
  border-radius: 16px; padding: 13px 12px;
  display: flex; align-items: flex-start; gap: 11;
  transition: opacity .2s, transform .12s;
}
.task-card.done { opacity: .38; }
.task-card:active { transform: scale(.99); }

.check-btn {
  width: 24px; height: 24px; border-radius: 8px;
  border: 2px solid var(--cc); background: transparent;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  margin-top: 1px; transition: all .15s; padding: 0;
}
.check-btn.checked { background: var(--cc); border-color: var(--cc); }
.check-btn .tick { font-size: 11px; color: #000; font-weight: 900; display: none; }
.check-btn.checked .tick { display: block; }

.task-body { flex: 1; min-width: 0; }
.task-title { font-size: 15px; font-weight: 700; color: var(--text); word-break: break-word; margin-bottom: 7px; }
.task-card.done .task-title { text-decoration: line-through; color: var(--hint); }
.task-desc { font-size: 12px; color: var(--hint); margin-top: 5px; line-height: 1.45; }
.tags { display: flex; flex-wrap: wrap; gap: 5; }
.tag {
  font-size: 10px; font-weight: 800; padding: 3px 9px; border-radius: 20px;
  border: 1px solid; letter-spacing: .03em; white-space: nowrap;
}
.task-actions { display: flex; flex-direction: column; gap: 3; flex-shrink: 0; }
.icon-btn {
  background: transparent; border: none; color: rgba(255,255,255,0.18);
  font-size: 14px; cursor: pointer; padding: 5px 6px; border-radius: 8px;
  line-height: 1; transition: all .14s; font-family: inherit;
}
.icon-btn:active { color: var(--text); background: rgba(255,255,255,.08); }

/* ── Bottom sheet ── */
.sheet-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.8);
  backdrop-filter: blur(8px); z-index: 80;
  opacity: 0; transition: opacity .22s; pointer-events: none;
}
.sheet-backdrop.open { opacity: 1; pointer-events: all; }

.sheet {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 90;
  background: var(--bg2); border-radius: 24px 24px 0 0;
  border-top: 1px solid rgba(255,255,255,.08);
  padding: 0 18px; transform: translateY(100%);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
  max-height: 92vh; overflow-y: auto;
}
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; border-radius: 4px; background: rgba(255,255,255,.15); margin: 12px auto 18px; }
.sheet-title { font-size: 18px; font-weight: 900; margin-bottom: 18px; }

/* ── Form elements ── */
.field { display: flex; flex-direction: column; gap: 7; margin-bottom: 14px; }
.field label { font-size: 11px; font-weight: 800; color: var(--hint); letter-spacing: .1em; text-transform: uppercase; }
.field input, .field textarea {
  background: var(--bg); border: 1.5px solid rgba(255,255,255,.09);
  border-radius: 14px; padding: 12px 14px;
  color: var(--text); font-size: 15px; font-family: inherit; font-weight: 600;
  outline: none; width: 100%; transition: border-color .18s;
}
.field input:focus, .field textarea:focus { border-color: rgba(124,110,255,.5); }
.field textarea { resize: none; min-height: 72px; line-height: 1.5; }

.seg-row { display: flex; flex-wrap: wrap; gap: 6; }
.seg {
  background: rgba(255,255,255,.05); border: 1.5px solid rgba(255,255,255,.08);
  border-radius: 12px; padding: 8px 12px; color: var(--hint);
  cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit; transition: all .16s;
}
.seg.active { font-weight: 800; }

.pri-row { display: flex; gap: 7; }
.pri-btn {
  flex: 1; background: rgba(255,255,255,.05); border: 1.5px solid rgba(255,255,255,.08);
  border-radius: 12px; padding: 9px 4px; color: var(--hint);
  cursor: pointer; font-size: 12px; font-weight: 700; font-family: inherit; transition: all .16s;
}

.sheet-footer {
  display: flex; gap: 10; padding: 14px 0 30px;
  position: sticky; bottom: 0; background: var(--bg2);
  border-top: 1px solid rgba(255,255,255,.06);
  margin: 4px -18px 0; padding-left: 18px; padding-right: 18px;
}
.cancel-btn {
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.09);
  border-radius: 14px; padding: 13px 20px; color: var(--hint);
  font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
}
.submit-btn {
  flex: 1; border: none; border-radius: 14px; padding: 13px;
  color: #fff; font-size: 15px; font-weight: 900;
  cursor: pointer; font-family: inherit; transition: opacity .18s;
  background: linear-gradient(135deg, #7C6EFF, #B06EFF);
  box-shadow: 0 4px 20px rgba(124,110,255,0.35);
}

/* ── Color picker grid ── */
.color-grid { display: flex; flex-wrap: wrap; gap: 9; margin-bottom: 4px; }
.color-dot {
  width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
  border: 2.5px solid transparent; transition: all .16s; flex-shrink: 0;
}
.color-dot.active { border-color: #fff; transform: scale(1.15); }

/* ── Emoji picker ── */
.emoji-grid { display: flex; flex-wrap: wrap; gap: 6; margin-bottom: 4px; }
.emoji-opt {
  width: 40px; height: 40px; border-radius: 12px; cursor: pointer;
  background: rgba(255,255,255,.05); border: 1.5px solid transparent;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; transition: all .14s;
}
.emoji-opt.active { border-color: rgba(124,110,255,.6); background: rgba(124,110,255,.15); }
.emoji-opt:active { transform: scale(.9); }

/* ── Group manager sheet ── */
.group-list { display: flex; flex-direction: column; gap: 8; margin-bottom: 14px; }
.group-row {
  display: flex; align-items: center; gap: 10;
  background: var(--bg); border: 1.5px solid rgba(255,255,255,.07);
  border-radius: 14px; padding: 11px 13px; cursor: pointer; transition: all .16s;
}
.group-row:active { background: var(--bg3); }
.group-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.group-em  { font-size: 20px; flex-shrink: 0; }
.group-label { flex: 1; font-size: 14px; font-weight: 700; }
.group-count { font-size: 12px; color: var(--hint); font-weight: 600; }
.group-del {
  background: rgba(255,68,68,.12); border: none; border-radius: 9px;
  color: #FF4444; font-size: 14px; cursor: pointer; padding: 6px 9px;
  font-family: inherit; transition: all .16s;
}
.group-del:active { background: rgba(255,68,68,.25); }
.group-del.disabled { opacity: .3; cursor: default; }
.group-locked { font-size: 12px; color: var(--hint); padding: 4px 8px; }

/* ── Tabs ── */
.cat-tabs { display: flex; gap: 8px; padding: 12px 14px 4px; overflow-x: auto; flex-shrink: 0; }
.cat-tabs::-webkit-scrollbar { display: none; }
.tab-all, .cat-tab {
  flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
  padding: 10px 12px; border-radius: 16px;
  border: 1.5px solid rgba(255,255,255,0.07);
  background: var(--bg2); cursor: pointer; transition: all .2s; position: relative;
}
.tab-all { min-width: 58px; }
.cat-tab { min-width: 72px; }
.tab-all.active { border-color: rgba(124,110,255,0.5); background: rgba(124,110,255,0.12); }
.cat-tab.active { border-color: var(--tc); background: var(--tb); }
.tab-em  { font-size: 20px; line-height: 1; margin-bottom: 3px; }
.tab-cnt { font-size: 17px; font-weight: 900; color: var(--hint); line-height: 1; margin-bottom: 1px; }
.tab-lbl { font-size: 10px; font-weight: 700; color: var(--hint); white-space: nowrap; letter-spacing: .02em; }
.tab-all.active .tab-cnt, .tab-all.active .tab-lbl { color: #9D91FF; }
.cat-tab.active .tab-cnt, .cat-tab.active .tab-lbl { color: var(--tc); }
.tab-edit-dot {
  position: absolute; top: 5px; right: 5px;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--tc); opacity: 0; transition: opacity .2s; pointer-events: none;
}
.cat-tab:active .tab-edit-dot { opacity: .8; }
.tab-add {
  flex-shrink: 0; min-width: 46px; height: 78px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 16px; border: 1.5px dashed rgba(255,255,255,0.12);
  background: transparent; cursor: pointer; color: var(--hint); font-size: 22px; transition: all .2s;
}
.tab-add:active { background: rgba(255,255,255,0.05); }

/* ── Sort pill ── */
.sort-pill {
  display: flex; align-items: center;
  margin: 8px 14px 4px;
  background: var(--bg2); border: 1.5px solid rgba(255,255,255,0.07);
  border-radius: 14px; overflow: hidden;
}
.sort-btn {
  flex: 1; padding: 9px 12px; border: none; background: transparent;
  color: var(--hint); font-size: 12px; font-weight: 800; font-family: inherit;
  cursor: pointer; transition: all .18s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.sort-btn.active { background: rgba(124,110,255,0.15); color: #9D91FF; }

input[type=date], input[type=time] { color-scheme: dark; }
</style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="hdr-title">
      <span class="em" id="hdr-em">◉</span>
      <span class="lbl" id="hdr-lbl">Все задачи</span>
    </div>
    <span id="sync-status" style="font-size:11px;color:var(--hint);opacity:0;transition:opacity .3s;white-space:nowrap"></span>
    <button class="hdr-btn" id="groups-btn" title="Группы">⊞</button>
    <button class="hdr-btn" id="sync-btn" title="Синхронизация">⇄</button>
    <button class="hdr-btn primary" id="open-modal-btn">+</button>
  </header>


  <div class="cat-tabs" id="cat-tabs"></div>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" id="search-input" type="search" placeholder="Поиск...">
  </div>

  <div class="sort-pill">
    <button class="sort-btn active" id="sort-date-btn" onclick="setSort('date')">📅 По дате</button>
    <button class="sort-btn" id="sort-pri-btn" onclick="setSort('priority')">⚡ По важности</button>
  </div>

  <button class="done-toggle" id="done-toggle">○ Выполненные</button>
  <div class="task-list" id="task-list"></div>
</div>

<!-- Task sheet -->
<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheet-title">Новая задача</div>
  <div class="field"><label>Название *</label><input type="text" id="f-title" placeholder="Что нужно сделать?" maxlength="120"></div>
  <div class="field"><label>Описание</label><textarea id="f-desc" placeholder="Детали..."></textarea></div>
  <div class="field"><label>Группа</label><div class="seg-row" id="f-cat"></div></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap">
    <div class="field" style="flex:1;min-width:130px"><label>Приоритет</label><div class="pri-row" id="f-pri"></div></div>
    <div class="field" style="flex:1;min-width:120px">
      <label>Дата</label>
      <input type="date" id="f-date">
    </div>
    <div class="field" style="flex:1;min-width:100px">
      <label>Время</label>
      <input type="time" id="f-time">
    </div>
  </div>
  <div class="sheet-footer">
    <button class="cancel-btn" id="cancel-btn">Отмена</button>
    <button class="submit-btn" id="submit-btn">Создать</button>
  </div>
</div>

<!-- Groups manager sheet -->
<div class="sheet-backdrop" id="gm-backdrop"></div>
<div class="sheet" id="gm-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">⊞ Управление группами</div>
  <div class="group-list" id="gm-list"></div>
  <button onclick="openNewGroup()"
    style="width:100%;background:rgba(124,110,255,.1);border:1.5px dashed rgba(124,110,255,.35);
           border-radius:14px;padding:13px;color:#9D91FF;font-size:14px;font-weight:800;
           cursor:pointer;font-family:inherit;margin-bottom:4px;transition:all .18s">
    + Новая группа
  </button>
  <div class="sheet-footer" style="border-top:none">
    <button class="cancel-btn" onclick="closeGM()" style="flex:1">Закрыть</button>
  </div>
</div>

<!-- Group editor sheet -->
<div class="sheet-backdrop" id="ge-backdrop"></div>
<div class="sheet" id="ge-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="ge-title">Новая группа</div>

  <div class="field">
    <label>Название</label>
    <input type="text" id="ge-name" placeholder="Название группы" maxlength="20">
  </div>

  <div class="field">
    <label>Иконка</label>
    <div class="emoji-grid" id="ge-emojis"></div>
  </div>

  <div class="field">
    <label>Цвет</label>
    <div class="color-grid" id="ge-colors"></div>
  </div>

  <div class="sheet-footer">
    <button class="cancel-btn" onclick="closeGE()">Отмена</button>
    <button class="submit-btn" id="ge-submit" onclick="saveGroup()">Создать</button>
  </div>
</div>

<!-- Sync sheet -->
<div id="sync-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
     backdrop-filter:blur(8px);z-index:200;align-items:flex-end;justify-content:center">
  <div style="background:var(--bg2);border-radius:24px 24px 0 0;border-top:1px solid rgba(255,255,255,.1);
              padding:20px 20px 36px;width:100%;max-height:85vh;overflow-y:auto">
    <div style="width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:4px;margin:0 auto 18px"></div>
    <div style="font-size:18px;font-weight:900;margin-bottom:6px">⇄ Синхронизация</div>
    <div id="sync-hint" style="font-size:13px;color:var(--hint);margin-bottom:20px">Синхронизируй задачи между устройствами</div>
    <div style="font-size:11px;font-weight:800;color:var(--hint);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">Твой Sync ID</div>
    <div style="display:flex;gap:8px;margin-bottom:20px">
      <div id="sync-id-display" onclick="copySyncId()"
        style="flex:1;background:var(--bg);border:1.5px solid rgba(255,255,255,.1);border-radius:14px;
               padding:12px 14px;font-family:monospace;font-size:12px;color:#10D9A0;
               word-break:break-all;cursor:pointer;line-height:1.4">—</div>
      <button onclick="copySyncId()"
        style="background:rgba(16,217,160,.15);border:1.5px solid rgba(16,217,160,.3);border-radius:14px;
               color:#10D9A0;font-size:18px;width:48px;cursor:pointer;flex-shrink:0">⎘</button>
    </div>
    <div style="font-size:11px;font-weight:800;color:var(--hint);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">Вставь ID с другого устройства</div>
    <input id="sync-id-input" placeholder="Вставь Sync ID сюда..."
      style="width:100%;background:var(--bg);border:1.5px solid rgba(255,255,255,.1);border-radius:14px;
             padding:12px 14px;color:var(--text);font-size:14px;font-family:monospace;font-weight:600;
             outline:none;box-sizing:border-box;margin-bottom:14px">
    <div style="display:flex;gap:10px">
      <button onclick="hideSyncSetup()"
        style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:14px;
               padding:13px 20px;color:var(--hint);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">Закрыть</button>
      <button onclick="applySyncId()"
        style="flex:1;background:linear-gradient(135deg,#7C6EFF,#B06EFF);border:none;border-radius:14px;
               padding:13px;color:#fff;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit">Подключить</button>
    </div>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready(); tg.expand(); tg.disableVerticalSwipes?.();
  const tp = tg.themeParams || {};
  if (tp.bg_color)          document.documentElement.style.setProperty('--bg',  tp.bg_color);
  if (tp.secondary_bg_color)document.documentElement.style.setProperty('--bg2', tp.secondary_bg_color);
  if (tp.text_color)        document.documentElement.style.setProperty('--text',tp.text_color);
  if (tp.hint_color)        document.documentElement.style.setProperty('--hint',tp.hint_color);
  if (tp.button_color)      document.documentElement.style.setProperty('--btn', tp.button_color);
}

// ─── Default groups (locked, can't delete) ───────────────────────────────────
// Омут и ГПМ поменяны цветами местами
const DEFAULT_CAT_IDS = ['omut','gpm','study','home','pers'];
const DEFAULT_CATS = [
  { id:'omut',  label:'Омут',    emoji:'🌊', color:'#FF6B35', locked:true },
  { id:'gpm',   label:'ГПМ',     emoji:'⚙️', color:'#00C2FF', locked:true },
  { id:'study', label:'Учёба',   emoji:'📚', color:'#A855F7', locked:true },
  { id:'home',  label:'Бытовые', emoji:'🏠', color:'#10D9A0', locked:true },
  { id:'pers',  label:'Личные',  emoji:'✨', color:'#FF4FA0', locked:true },
];

// User-created categories stored separately
let customCats = JSON.parse(localStorage.getItem('custom-cats') || '[]');

function getAllCats() { return [...DEFAULT_CATS, ...customCats]; }
function makeAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function getC(id) {
  const c = getAllCats().find(c => c.id === id);
  if (!c) return getAllCats()[0];
  return { ...c, bg: makeAlpha(c.color,.12), border: makeAlpha(c.color,.35) };
}

// ─── Priorities ───────────────────────────────────────────────────────────────
const PRIS = [
  { id:'high', label:'Высокий', color:'#FF4444' },
  { id:'med',  label:'Средний', color:'#FFB800' },
  { id:'low',  label:'Низкий',  color:'#7C6EFF' },
];
const getP = id => PRIS.find(p=>p.id===id)||PRIS[1];

// ─── State ────────────────────────────────────────────────────────────────────
let tasks     = [];
let activeCat = 'all';
let showDone  = false;
let editId    = null;
let formCat   = 'omut';
let formPri   = 'med';
let sortBy    = 'date'; // 'date' | 'priority'

// ─── JSONBin Storage ──────────────────────────────────────────────────────────
const JSONBIN_KEY = '$2a$10$TE0WDB3QCCU7jwjWk9FLMO.ZEGvi96DKkJfDS/YKeDuqSHnSK/Gvy';
const JSONBIN_OK  = JSONBIN_KEY !== 'PASTE_YOUR_KEY_HERE';
const BIN_ID_KEY  = 'tma_bin_id';

function dbg(msg, color) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.textContent = msg; el.style.color = color||'#666'; el.style.opacity = msg?'1':'0';
}
function getSyncId() { return localStorage.getItem(BIN_ID_KEY)||''; }
function setSyncId(id) { localStorage.setItem(BIN_ID_KEY, id.trim()); }

async function binCreate(data) {
  const r = await fetch('https://api.jsonbin.io/v3/b',{method:'POST',
    headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY,'X-Bin-Name':'tma-tasks','X-Bin-Private':'true'},
    body:JSON.stringify({tasks:data,cats:customCats})});
  if(!r.ok)throw new Error('create '+r.status);
  return (await r.json()).metadata.id;
}
async function binRead(id) {
  const r = await fetch('https://api.jsonbin.io/v3/b/'+id+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY}});
  if(!r.ok)throw new Error('read '+r.status);
  const j = await r.json();
  return j.record;
}
async function binWrite(id, tasks, cats) {
  const r = await fetch('https://api.jsonbin.io/v3/b/'+id,{method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},
    body:JSON.stringify({tasks,cats})});
  if(!r.ok)throw new Error('write '+r.status);
}

function load(callback) {
  try { const c=localStorage.getItem('tma-tasks-v1'); if(c){tasks=JSON.parse(c);render();} } catch{}
  try { const cc=localStorage.getItem('custom-cats'); if(cc)customCats=JSON.parse(cc); } catch{}

  if(!JSONBIN_OK){ dbg('⚠ Локально','#FF6B35'); setTimeout(()=>dbg(''),3000); callback&&callback(); return; }

  const binId = getSyncId();
  if(!binId){
    dbg('⟳','#FFB800');
    binCreate(tasks).then(id=>{ setSyncId(id); dbg('✓','#10D9A0'); setTimeout(()=>{dbg('');showSyncSetup(id,true);},800); callback&&callback(); })
    .catch(e=>{ dbg('✗ '+e.message,'#FF4444'); setTimeout(()=>dbg(''),3000); callback&&callback(); });
  } else {
    dbg('⟳','#FFB800');
    binRead(binId).then(rec=>{
      if(Array.isArray(rec.tasks)){ tasks=rec.tasks; try{localStorage.setItem('tma-tasks-v1',JSON.stringify(tasks));}catch{} }
      if(Array.isArray(rec.cats) && rec.cats.length){ customCats=rec.cats; try{localStorage.setItem('custom-cats',JSON.stringify(customCats));}catch{} }
      render(); dbg(''); callback&&callback();
    }).catch(e=>{ dbg('✗ '+e.message,'#FF4444'); setTimeout(()=>dbg(''),3000); callback&&callback(); });
  }
}

let saveTimer;
function save() {
  clearTimeout(saveTimer);
  try{localStorage.setItem('tma-tasks-v1',JSON.stringify(tasks));}catch{}
  try{localStorage.setItem('custom-cats',JSON.stringify(customCats));}catch{}
  saveTimer = setTimeout(async()=>{
    if(!JSONBIN_OK)return;
    dbg('💾','#FFB800');
    try{
      let binId=getSyncId();
      if(!binId){binId=await binCreate(tasks);setSyncId(binId);}
      else await binWrite(binId,tasks,customCats);
      dbg('✓','#10D9A0'); setTimeout(()=>dbg(''),1500);
    }catch(e){dbg('✗ '+e.message,'#FF4444');setTimeout(()=>dbg(''),3000);}
  },1000);
}

// ─── Utils ────────────────────────────────────────────────────────────────────
const genId   = () => Math.random().toString(36).slice(2)+Date.now().toString(36);
const fmtDate = (d, t) => {
  if (!d) return '';
  const base = new Date(d+'T00:00:00').toLocaleDateString('ru-RU',{day:'2-digit',month:'short'});
  return t ? base + ' ' + t : base;
};
const isToday   = d => d && new Date(d+'T00:00:00').toDateString()===new Date().toDateString();
const isOverdue = (d, t) => {
  if (!d) return false;
  const dt = t ? new Date(d+'T'+t) : new Date(d+'T00:00:00');
  return dt < new Date() && !isToday(d);
};
const escHtml   = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ─── Sort ────────────────────────────────────────────────────────────────────
function setSort(mode) {
  sortBy = mode;
  document.getElementById('sort-date-btn').classList.toggle('active', mode==='date');
  document.getElementById('sort-pri-btn').classList.toggle('active', mode==='priority');
  if(tg) tg.HapticFeedback?.selectionChanged?.();
  render();
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() { renderTabs(); renderTasks(); updateHeader(); }

function renderTabs() {
  const el = document.getElementById('cat-tabs');
  const allCats = getAllCats();
  const allCount = tasks.filter(t=>!t.done).length;

  let html = `<button class="tab-all ${activeCat==='all'?'active':''}" data-cat="all">
    <span class="tab-em">◉</span>
    <span class="tab-cnt">${allCount}</span>
    <span class="tab-lbl">Все</span>
  </button>`;

  allCats.forEach(c => {
    const cnt = tasks.filter(t=>t.category===c.id&&!t.done).length;
    const isA = activeCat===c.id;
    html += `<button class="cat-tab ${isA?'active':''}" data-cat="${c.id}"
      data-long="${c.id}"
      style="--tc:${c.color};--tb:${makeAlpha(c.color,.12)}">
      <span class="tab-em">${c.emoji}</span>
      <span class="tab-cnt">${cnt}</span>
      <span class="tab-lbl">${c.label}</span>
      <span class="tab-edit-dot" style="background:${c.color}"></span>
    </button>`;
  });

  html += `<button class="tab-add" onclick="openNewGroup()">+</button>`;
  el.innerHTML = html;

  el.querySelectorAll('[data-cat]').forEach(btn => {
    let pressTimer;
    btn.addEventListener('click', () => { activeCat=btn.dataset.cat; render(); });
    // Long press to edit
    btn.addEventListener('touchstart', ()=>{ pressTimer=setTimeout(()=>{ if(btn.dataset.long) openEditGroup(btn.dataset.long); },500); },{passive:true});
    btn.addEventListener('touchend', ()=>clearTimeout(pressTimer),{passive:true});
    btn.addEventListener('touchmove', ()=>clearTimeout(pressTimer),{passive:true});
  });
}

function updateHeader() {
  const em=document.getElementById('hdr-em'), lbl=document.getElementById('hdr-lbl');
  if(activeCat==='all'){ em.textContent='◉'; lbl.textContent='Все задачи'; lbl.style.color=''; }
  else { const c=getC(activeCat); em.textContent=c.emoji; lbl.textContent=c.label; lbl.style.color=c.color; }
}

function renderTasks() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const listEl = document.getElementById('task-list');
  const PRI_ORDER = {high:0, med:1, low:2};
  const filtered = tasks.filter(t => {
    if(!showDone&&t.done)return false;
    if(activeCat!=='all'&&t.category!==activeCat)return false;
    if(search&&!t.title.toLowerCase().includes(search))return false;
    return true;
  }).sort((a,b) => {
    // Done tasks always at bottom
    if(a.done !== b.done) return a.done ? 1 : -1;
    if(sortBy === 'date') {
      if(!a.dueDate && !b.dueDate) return 0;
      if(!a.dueDate) return 1;
      if(!b.dueDate) return -1;
      const da = a.dueTime ? new Date(a.dueDate+'T'+a.dueTime) : new Date(a.dueDate+'T00:00:00');
      const db = b.dueTime ? new Date(b.dueDate+'T'+b.dueTime) : new Date(b.dueDate+'T00:00:00');
      return da - db;
    } else {
      return (PRI_ORDER[a.priority]||1) - (PRI_ORDER[b.priority]||1);
    }
  });
  if(!filtered.length){
    listEl.innerHTML=`<div class="empty"><div class="empty-icon">✦</div><div class="empty-text">Нет задач</div><div class="empty-sub">Нажми + чтобы добавить</div></div>`;
    return;
  }
  listEl.innerHTML = filtered.map(task=>{
    const c=getC(task.category), p=getP(task.priority);
    const over=isOverdue(task.dueDate,task.dueTime), today=isToday(task.dueDate);
    let dBg='rgba(255,255,255,0.05)',dCo='#555',dBo='rgba(255,255,255,0.09)';
    if(over){ dBg='rgba(255,68,68,0.12)';dCo='#FF4444';dBo='rgba(255,68,68,0.3)'; }
    if(today){ dBg='rgba(255,184,0,0.12)';dCo='#FFB800';dBo='rgba(255,184,0,0.3)'; }
    const dateTag = task.dueDate?`<span class="tag" style="background:${dBg};color:${dCo};border-color:${dBo}">${over?'⚠ ':today?'◎ ':'◷ '}${fmtDate(task.dueDate,task.dueTime)}</span>`:'';
    return `<div class="task-card ${task.done?'done':''}" style="--cc:${c.color}">
      <button class="check-btn ${task.done?'checked':''}" data-toggle="${task.id}" style="border-color:${c.color};${task.done?'background:'+c.color:''}">
        <span class="tick">✓</span>
      </button>
      <div class="task-body">
        <div class="task-title">${escHtml(task.title)}</div>
        <div class="tags">
          <span class="tag" style="background:${makeAlpha(c.color,.12)};color:${c.color};border-color:${makeAlpha(c.color,.3)}">${c.emoji} ${c.label}</span>
          <span class="tag" style="background:${p.color}18;color:${p.color};border-color:${p.color}44">● ${p.label}</span>
          ${dateTag}
        </div>
        ${task.desc?`<div class="task-desc">${escHtml(task.desc)}</div>`:''}
      </div>
      <div class="task-actions">
        <button class="icon-btn" data-edit="${task.id}">✎</button>
        <button class="icon-btn" data-del="${task.id}">✕</button>
      </div>
    </div>`;
  }).join('');

  listEl.querySelectorAll('[data-toggle]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();toggleTask(b.dataset.toggle);}));
  listEl.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();openEdit(b.dataset.edit);}));
  listEl.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();deleteTask(b.dataset.del);}));
}

// ─── Task form ────────────────────────────────────────────────────────────────
function buildForm() {
  const allCats = getAllCats();
  document.getElementById('f-cat').innerHTML = allCats.map(c=>`
    <button class="seg ${formCat===c.id?'active':''}" data-fc="${c.id}"
      style="${formCat===c.id?`background:${makeAlpha(c.color,.12)};border-color:${c.color};color:${c.color}`:''}">
      ${c.emoji} ${c.label}</button>`).join('');
  document.getElementById('f-cat').querySelectorAll('[data-fc]').forEach(b=>b.addEventListener('click',()=>{formCat=b.dataset.fc;buildForm();}));

  document.getElementById('f-pri').innerHTML = PRIS.map(p=>`
    <button class="pri-btn" data-fp="${p.id}"
      style="${formPri===p.id?`background:${p.color}22;border-color:${p.color};color:${p.color}`:''}">
      ● ${p.label}</button>`).join('');
  document.getElementById('f-pri').querySelectorAll('[data-fp]').forEach(b=>b.addEventListener('click',()=>{formPri=b.dataset.fp;buildForm();}));

  const c=getC(formCat);
  document.getElementById('submit-btn').style.background=`linear-gradient(135deg,${c.color},${c.color}cc)`;
  document.getElementById('submit-btn').style.boxShadow=`0 4px 20px ${makeAlpha(c.color,.35)}`;
}

function openNew() {
  editId=null; formCat=activeCat==='all'?'omut':activeCat; formPri='med';
  document.getElementById('f-title').value=''; document.getElementById('f-desc').value=''; document.getElementById('f-date').value=''; document.getElementById('f-time').value='';
  document.getElementById('sheet-title').textContent='Новая задача';
  document.getElementById('submit-btn').textContent='Создать';
  buildForm(); openSheet('sheet','backdrop');
  setTimeout(()=>document.getElementById('f-title').focus(),320);
}
function openEdit(id) {
  const t=tasks.find(t=>t.id===id); if(!t)return;
  editId=id; formCat=t.category; formPri=t.priority;
  document.getElementById('f-title').value=t.title; document.getElementById('f-desc').value=t.desc||''; document.getElementById('f-date').value=t.dueDate||''; document.getElementById('f-time').value=t.dueTime||'';
  document.getElementById('sheet-title').textContent='Редактировать';
  document.getElementById('submit-btn').textContent='Сохранить';
  buildForm(); openSheet('sheet','backdrop');
  if(tg)tg.BackButton.show();
}
function submitForm() {
  const title=document.getElementById('f-title').value.trim();
  if(!title){ document.getElementById('f-title').style.borderColor='#FF4444'; setTimeout(()=>document.getElementById('f-title').style.borderColor='',1200); return; }
  const data={title,desc:document.getElementById('f-desc').value.trim(),category:formCat,priority:formPri,dueDate:document.getElementById('f-date').value,dueTime:document.getElementById('f-time').value};
  if(editId) tasks=tasks.map(t=>t.id===editId?{...t,...data}:t);
  else tasks.unshift({id:genId(),...data,done:false,createdAt:Date.now()});
  save(); closeSheet('sheet','backdrop'); render();
  if(tg)tg.HapticFeedback?.impactOccurred('light');
}

// ─── Task actions ─────────────────────────────────────────────────────────────
function toggleTask(id){ tasks=tasks.map(t=>t.id===id?{...t,done:!t.done}:t); if(tg)tg.HapticFeedback?.impactOccurred('medium'); save();render(); }
function deleteTask(id){
  const confirm_del=()=>{ tasks=tasks.filter(t=>t.id!==id); save();render(); };
  if(tg) tg.showConfirm('Удалить задачу?',ok=>ok&&confirm_del());
  else if(confirm('Удалить задачу?')) confirm_del();
}

// ─── Sheet helpers ────────────────────────────────────────────────────────────
function openSheet(sid,bid){ document.getElementById(bid).classList.add('open'); document.getElementById(sid).classList.add('open'); document.body.style.overflow='hidden'; }
function closeSheet(sid,bid){ document.getElementById(bid).classList.remove('open'); document.getElementById(sid).classList.remove('open'); document.body.style.overflow=''; editId=null; if(tg)tg.BackButton.hide(); }

// ─── Groups Manager ───────────────────────────────────────────────────────────
function openGM() {
  renderGMList();
  openSheet('gm-sheet','gm-backdrop');
}
function closeGM() { closeSheet('gm-sheet','gm-backdrop'); }

function renderGMList() {
  const allCats = getAllCats();
  document.getElementById('gm-list').innerHTML = allCats.map(c=>{
    const cnt = tasks.filter(t=>t.category===c.id).length;
    const canDel = !c.locked && cnt===0;
    const hasTasks = cnt>0;
    return `<div class="group-row" onclick="${c.locked?'':'openEditGroup(\''+c.id+'\')'}" style="${c.locked?'cursor:default':''}">
      <div class="group-dot" style="background:${c.color}"></div>
      <span class="group-em">${c.emoji}</span>
      <span class="group-label">${c.label}</span>
      <span class="group-count">${cnt} задач</span>
      ${c.locked
        ? `<span class="group-locked">🔒</span>`
        : hasTasks
          ? `<span class="group-del disabled" title="Сначала удали задачи">✕</span>`
          : `<button class="group-del" onclick="event.stopPropagation();deleteGroup('${c.id}')">✕</button>`
      }
    </div>`;
  }).join('');
}

function deleteGroup(id) {
  const c = customCats.find(c=>c.id===id);
  if(!c)return;
  const cnt = tasks.filter(t=>t.category===id).length;
  if(cnt>0){ if(tg)tg.showAlert('Сначала удали или перенеси задачи из этой группы'); else alert('Сначала удали задачи'); return; }
  const doDel=()=>{ customCats=customCats.filter(c=>c.id!==id); if(activeCat===id)activeCat='all'; save(); render(); renderGMList(); };
  if(tg) tg.showConfirm(`Удалить группу «${c.label}»?`,ok=>ok&&doDel());
  else if(confirm(`Удалить группу «${c.label}»?`)) doDel();
}

// ─── Group Editor ─────────────────────────────────────────────────────────────
const PALETTE = ['#FF4444','#FF6B35','#FFB800','#7FE234','#10D9A0','#00C2FF','#0088FF','#7C6EFF','#B06EFF','#FF4FA0','#FF80AB','#FFFFFF'];
const EMOJIS  = ['⭐','🔥','💡','🎯','🚀','💼','📋','📌','🏆','🎮','💰','❤️','🎵','🌈','⚡','🛠️','📱','🏠','🌍','🎨','🧪','📊','✈️','🎁','🔑','💎','🌸','🍀','🦋','👾'];

let geEditId = null;
let geColor  = '#7C6EFF';
let geEmoji  = '⭐';

function openNewGroup() {
  closeGM();
  geEditId=null; geColor='#7C6EFF'; geEmoji='⭐';
  document.getElementById('ge-title').textContent='Новая группа';
  document.getElementById('ge-name').value='';
  document.getElementById('ge-submit').textContent='Создать';
  buildGE();
  setTimeout(()=>{ openSheet('ge-sheet','ge-backdrop'); document.getElementById('ge-name').focus(); },200);
}
function openEditGroup(id) {
  const c = getAllCats().find(c=>c.id===id);
  if(!c)return;
  if(c.locked){ if(tg)tg.showAlert('Стандартные группы нельзя редактировать'); else alert('Стандартные группы нельзя редактировать'); return; }
  closeGM();
  geEditId=id; geColor=c.color; geEmoji=c.emoji;
  document.getElementById('ge-title').textContent='Редактировать группу';
  document.getElementById('ge-name').value=c.label;
  document.getElementById('ge-submit').textContent='Сохранить';
  buildGE();
  setTimeout(()=>openSheet('ge-sheet','ge-backdrop'),200);
}
function closeGE() { closeSheet('ge-sheet','ge-backdrop'); setTimeout(()=>openGM(),200); }

function buildGE() {
  document.getElementById('ge-colors').innerHTML = PALETTE.map(col=>`
    <div class="color-dot ${geColor===col?'active':''}" style="background:${col}" onclick="pickColor('${col}')"></div>`).join('');
  document.getElementById('ge-emojis').innerHTML = EMOJIS.map(em=>`
    <button class="emoji-opt ${geEmoji===em?'active':''}" onclick="pickEmoji('${em}')">${em}</button>`).join('');
  document.getElementById('ge-submit').style.background=`linear-gradient(135deg,${geColor},${geColor}cc)`;
}
function pickColor(col){ geColor=col; buildGE(); }
function pickEmoji(em) { geEmoji=em;  buildGE(); }

function saveGroup() {
  const name = document.getElementById('ge-name').value.trim();
  if(!name){ document.getElementById('ge-name').style.borderColor='#FF4444'; setTimeout(()=>document.getElementById('ge-name').style.borderColor='',1200); return; }
  if(geEditId){
    customCats=customCats.map(c=>c.id===geEditId?{...c,label:name,emoji:geEmoji,color:geColor}:c);
  } else {
    const id='cat_'+Date.now().toString(36);
    customCats.push({id,label:name,emoji:geEmoji,color:geColor,locked:false});
  }
  save(); render();
  closeSheet('ge-sheet','ge-backdrop');
  setTimeout(()=>openGM(),200);
  if(tg)tg.HapticFeedback?.impactOccurred('light');
}

// ─── Sync ─────────────────────────────────────────────────────────────────────
function showSyncSetup(id, isNew) {
  document.getElementById('sync-modal').style.display='flex';
  document.getElementById('sync-id-display').textContent=id||getSyncId()||'—';
  document.getElementById('sync-id-input').value='';
  document.getElementById('sync-hint').textContent=isNew?'🎉 Облако создано! Скопируй Sync ID для других устройств':'Синхронизируй задачи между устройствами';
}
function hideSyncSetup(){ document.getElementById('sync-modal').style.display='none'; }
function copySyncId(){
  const id=getSyncId(); if(!id)return;
  navigator.clipboard?.writeText(id).catch(()=>{});
  dbg('✓ Скопировано!','#10D9A0'); setTimeout(()=>dbg(''),1500);
}
async function applySyncId(){
  const val=document.getElementById('sync-id-input').value.trim();
  if(!val){hideSyncSetup();return;}
  hideSyncSetup(); dbg('⟳','#FFB800');
  try{
    const rec=await binRead(val);
    if(Array.isArray(rec.tasks)){tasks=rec.tasks;setSyncId(val);try{localStorage.setItem('tma-tasks-v1',JSON.stringify(tasks));}catch{}}
    if(Array.isArray(rec.cats)&&rec.cats.length){customCats=rec.cats;try{localStorage.setItem('custom-cats',JSON.stringify(customCats));}catch{}}
    render(); dbg('✓','#10D9A0'); setTimeout(()=>dbg(''),2000);
  }catch(e){ dbg('✗ Неверный ID','#FF4444'); setTimeout(()=>dbg(''),3000); }
}

// ─── Event listeners ──────────────────────────────────────────────────────────
document.getElementById('open-modal-btn').addEventListener('click', openNew);
document.getElementById('cancel-btn').addEventListener('click', ()=>closeSheet('sheet','backdrop'));
document.getElementById('submit-btn').addEventListener('click', submitForm);
document.getElementById('backdrop').addEventListener('click', ()=>closeSheet('sheet','backdrop'));
document.getElementById('gm-backdrop').addEventListener('click', closeGM);
document.getElementById('ge-backdrop').addEventListener('click', ()=>closeSheet('ge-sheet','ge-backdrop'));
document.getElementById('groups-btn').addEventListener('click', openGM);
document.getElementById('sync-btn').addEventListener('click', ()=>showSyncSetup());
document.getElementById('search-input').addEventListener('input', ()=>render());
document.getElementById('done-toggle').addEventListener('click', function(){
  showDone=!showDone; this.classList.toggle('on',showDone);
  this.textContent=showDone?'✓ Выполненные':'○ Выполненные'; render();
});

if(tg){
  tg.BackButton.onClick(()=>{
    if(document.getElementById('ge-sheet').classList.contains('open')){closeSheet('ge-sheet','ge-backdrop');setTimeout(()=>openGM(),200);}
    else if(document.getElementById('gm-sheet').classList.contains('open')){closeGM();}
    else if(document.getElementById('sheet').classList.contains('open')){closeSheet('sheet','backdrop');}
  });
}

let touchY=0;
['sheet','gm-sheet','ge-sheet'].forEach(sid=>{
  document.getElementById(sid).addEventListener('touchstart',e=>{touchY=e.touches[0].clientY;},{passive:true});
  document.getElementById(sid).addEventListener('touchend',e=>{
    if(e.changedTouches[0].clientY-touchY>90){
      if(sid==='sheet')closeSheet('sheet','backdrop');
      else if(sid==='gm-sheet')closeGM();
      else if(sid==='ge-sheet'){closeSheet('ge-sheet','ge-backdrop');setTimeout(()=>openGM(),200);}
    }
  },{passive:true});
});

// ─── Init ─────────────────────────────────────────────────────────────────────
load(()=>render());
render();
</script>
